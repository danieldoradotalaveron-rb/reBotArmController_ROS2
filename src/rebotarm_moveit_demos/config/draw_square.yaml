draw_square:
  ros__parameters:
    group_name: arm
    joint_names:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    wrap_joint_names:
      - joint6
    max_wrap_joint_delta: 3.0

    frame_id: base_link
    tcp_link_name: gripper_tcp
    start_point: [0.0, -0.75, -0.55, 0.0, 0.0, 0.0]

    rectangle_center: [0.28, 0.0, 0.12]
    rectangle_width: 0.04
    rectangle_height: 0.08
    tcp_rpy: [0.0, 1.57, 0.0]
    tcp_yaw_offsets: [0.0, 3.1416, -3.1416]

    ik_timeout: 5.0
    result_timeout: 30.0
    motion_duration: 3.0
    avoid_collisions: true
