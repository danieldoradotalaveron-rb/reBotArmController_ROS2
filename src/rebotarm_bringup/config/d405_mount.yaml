# D405 eye-in-hand mount reference (not loaded by launch files).
# Runtime mount args: rebotarm_bringup/robot_description_launch.py
# TF chain and validation: docs/D405_EYE_IN_HAND.md

d405_eye_in_hand:
  enable: true
  parent_link: end_link
  mount_xyz: [0.05, 0.0, 0.03]
  mount_rpy: [0.0, 0.0, 0.0]
  camera_body_xyz: [0.0, 0.0, 0.0]
  camera_body_rpy: [0.0, 0.0, 0.0]
  calibrated: false
