name: Setup overlay workspace
description: >
  Install deps, fetch vendored SDK, and colcon-build the driver fork plus
  monitor and teleop overlay submodules. Requires ROS 2 Jazzy (setup-ros) first.

runs:
  using: composite
  steps:
    - name: Install build and test tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-colcon-common-extensions \
          python3-rosdep \
          python3-pytest \
          python3-pip \
          python3-numpy \
          ros-jazzy-xacro \
          ros-jazzy-tf-transformations
        # pin/motorbridge can pull NumPy 2.x; apt transforms3d (tf_transformations) needs 1.x
        # or transforms3d>=0.4.2. Pin both so user-site does not shadow system incorrectly.
        python3 -m pip install --user \
          'numpy<2' \
          'transforms3d>=0.4.2' \
          pin pyyaml motorbridge

    - name: Init rosdep
      shell: bash
      run: |
        sudo rosdep init || true
        rosdep update

    - name: Verify SDK submodule
      shell: bash
      run: |
        test -d third_party/reBotArm_control_py/reBotArm_control_py || \
          { echo "Missing SDK submodule — run: git submodule update --init third_party/reBotArm_control_py"; exit 1; }

    - name: Install ROS dependencies
      shell: bash
      run: |
        source /opt/ros/jazzy/setup.bash
        rosdep install --from-paths src \
          rebotarm_monitor_ros2/src \
          rebotarm_cartesian_gamepad_teleop_ros2/src \
          --ignore-src -r -y --rosdistro jazzy

    - name: Build driver and overlay workspaces
      shell: bash
      run: |
        source /opt/ros/jazzy/setup.bash
        colcon build --symlink-install --base-paths src
        source install/setup.bash
        cd rebotarm_monitor_ros2
        colcon build --symlink-install --base-paths src
        source install/setup.bash
        cd ../rebotarm_cartesian_gamepad_teleop_ros2
        colcon build --symlink-install --base-paths src
