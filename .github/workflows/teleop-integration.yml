# Build driver + teleop overlay and run fork integration tests for Cartesian teleop.
# Unit-only tests run in the teleop submodule CI (no external deps).

name: Teleop integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "src/rebotarm_msgs/**"
      - "src/rebotarm_bringup/**"
      - "integration/rebotarm_cartesian_teleop/**"
      - "rebotarm_cartesian_gamepad_teleop_ros2/**"
      - ".github/workflows/teleop-integration.yml"
  pull_request:
    paths:
      - "src/rebotarm_msgs/**"
      - "src/rebotarm_bringup/**"
      - "integration/rebotarm_cartesian_teleop/**"
      - "rebotarm_cartesian_gamepad_teleop_ros2/**"
      - ".github/workflows/teleop-integration.yml"

jobs:
  teleop_integration:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout (with teleop submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install build and test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-pytest \
            python3-pip \
            ros-jazzy-xacro
          python3 -m pip install --user pin numpy pyyaml motorbridge

      - name: Init rosdep
        run: |
          sudo rosdep init || true
          rosdep update

      - name: Fetch vendored SDK (not in git)
        run: |
          mkdir -p third_party
          git clone --depth 1 \
            https://github.com/vectorBH6/reBotArm_control_py.git \
            third_party/reBotArm_control_py

      - name: Install dependencies
        run: |
          source /opt/ros/jazzy/setup.bash
          rosdep install --from-paths src rebotarm_cartesian_gamepad_teleop_ros2/src \
            --ignore-src -r -y --rosdistro jazzy

      - name: Build driver and teleop overlay
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install --base-paths src
          source install/setup.bash
          cd rebotarm_cartesian_gamepad_teleop_ros2
          colcon build --symlink-install --base-paths src

      - name: Pytest (integration)
        env:
          REBOTARM_DRIVER_WS: ${{ github.workspace }}
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          source rebotarm_cartesian_gamepad_teleop_ros2/install/setup.bash
          python3 -m pytest integration/rebotarm_cartesian_teleop/test -q

      - name: Colcon test (teleop unit)
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          source rebotarm_cartesian_gamepad_teleop_ros2/install/setup.bash
          cd rebotarm_cartesian_gamepad_teleop_ros2
          colcon test --packages-select rebotarm_cartesian_teleop
          colcon test-result --verbose
